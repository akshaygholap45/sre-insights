<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
.spec{display:flex;flex-direction:column;gap:13px}
.line{display:flex;align-items:baseline;gap:16px}
.meta{font-family:var(--font-sans);font-size:11px;color:var(--color-text-tertiary);margin-left:auto;white-space:nowrap}
</style></head><body><div class="spec">
<div class="line"><span style="font:400 16px/1.4 var(--font-sans);color:var(--color-text)">Body Large — clear &amp; legible</span><span class="meta">16/24</span></div>
<div class="line"><span style="font:400 14px/1.4 var(--font-sans);color:var(--color-text-secondary)">Body — the default UI text size</span><span class="meta">14/22 · default</span></div>
<div class="line"><span style="font:400 12px/1.4 var(--font-sans);color:var(--color-text-secondary)">Body Small — secondary information</span><span class="meta">12/20</span></div>
<div class="line"><span style="font:400 12px/1.4 var(--font-sans);color:var(--color-text-tertiary)">Caption / helper text</span><span class="meta">12/18</span></div>
<div class="line"><span style="font:700 14px/1.4 var(--font-sans);color:var(--color-text)">Button Label</span><span class="meta">700 · 14/20</span></div>
<div class="line"><span style="font:700 14px/1.4 var(--font-sans);color:var(--mint-deep)">Amount ₹ 1,240.00</span><span class="meta">Lato Bold · tabular</span></div>
