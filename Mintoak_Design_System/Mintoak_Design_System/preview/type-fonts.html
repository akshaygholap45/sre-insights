<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
body{padding:22px 26px}
.big{font-family:var(--font-legacy);font-size:46px;line-height:1;color:var(--forest-oak);letter-spacing:-.01em}
.sub{font-family:var(--font-legacy);font-size:12px;color:var(--color-text-tertiary);margin-top:10px}
.weights{display:flex;gap:22px;flex-wrap:wrap;margin-top:18px}
.w{display:flex;flex-direction:column;gap:3px}
.wt{font-family:var(--font-legacy);font-size:24px;line-height:1;color:var(--color-text)}
.wl{font-family:var(--font-mono);font-size:10px;color:var(--color-text-tertiary)}
</style></head><body>
<div class="big">Lato</div>
<div class="sub">--font-sans · --font-legacy · the Mintoak typeface — humanist sans, warm &amp; highly legible</div>
<div class="weights">
  <div class="w"><span class="wt" style="font-weight:300">Light</span><span class="wl">300</span></div>
  <div class="w"><span class="wt" style="font-weight:400">Regular</span><span class="wl">400</span></div>
  <div class="w"><span class="wt" style="font-weight:700">Bold</span><span class="wl">700</span></div>
  <div class="w"><span class="wt" style="font-weight:900">Black</span><span class="wl">900</span></div>
  <div class="w"><span class="wt" style="font-style:italic">Italic</span><span class="wl">400 italic</span></div>
</div>
</body></html>
