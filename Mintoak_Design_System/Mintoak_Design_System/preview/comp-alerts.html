<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
.al{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border-radius:8px;border:1px solid;margin-bottom:12px;width:560px}
.ic{width:18px;height:18px;border-radius:50%;flex:none;margin-top:1px;display:flex;align-items:center;justify-content:center;color:#fff;font:700 11px/1 var(--font-sans)}
.ti{font:600 13px/1.3 var(--font-sans);color:var(--color-text)}
.ms{font:400 12px/1.4 var(--font-sans);color:var(--color-text-secondary);margin-top:2px}
.toast{box-shadow:var(--shadow-lg);border-color:var(--color-border-secondary);background:#fff;align-items:center}
.x{margin-left:auto;color:var(--neutral-400);font:400 15px/1 var(--font-sans);cursor:pointer}</style></head><body>
<div class="al" style="background:var(--color-success-bg);border-color:var(--color-success-border)"><span class="ic" style="background:var(--color-success)">✓</span><div><div class="ti">Settlement complete</div><div class="ms">₹4,82,300 credited to HDFC ••4521.</div></div></div>
<div class="al" style="background:var(--color-warning-bg);border-color:var(--color-warning-border)"><span class="ic" style="background:var(--color-warning)">!</span><div><div class="ti">KYC expiring soon</div><div class="ms">3 merchants need re-verification this week.</div></div></div>
<div class="al toast"><span class="ic" style="background:var(--mint-600)">✓</span><div><div class="ti">Saved</div><div class="ms">Success toast — auto-dismisses in 4s.</div></div><span class="x">✕</span></div>
<div class="al toast" style="background:var(--color-error-bg);border-color:var(--color-error-border)"><span class="ic" style="background:var(--color-error)">!</span><div><div class="ti">Payment failed</div><div class="ms">UPI ref #MTK4821QF was declined. Ask the customer to retry.</div></div><span class="x">✕</span></div></body></html>
