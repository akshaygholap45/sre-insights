<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>.grid{display:flex;gap:22px}</style></head><body><div class="grid">
 <div class="col" style="gap:8px"><div class="row" style="gap:8px"><span style="width:34px;height:34px;border-radius:8px;background:var(--color-success)"></span><span style="width:34px;height:34px;border-radius:8px;background:var(--color-success-bg);border:1px solid var(--color-success-border)"></span></div><div class="lbl">Success</div></div>
 <div class="col" style="gap:8px"><div class="row" style="gap:8px"><span style="width:34px;height:34px;border-radius:8px;background:var(--color-info)"></span><span style="width:34px;height:34px;border-radius:8px;background:var(--color-info-bg);border:1px solid var(--color-info-border)"></span></div><div class="lbl">Info</div></div>
 <div class="col" style="gap:8px"><div class="row" style="gap:8px"><span style="width:34px;height:34px;border-radius:8px;background:var(--color-warning)"></span><span style="width:34px;height:34px;border-radius:8px;background:var(--color-warning-bg);border:1px solid var(--color-warning-border)"></span></div><div class="lbl">Warning</div></div>
 <div class="col" style="gap:8px"><div class="row" style="gap:8px"><span style="width:34px;height:34px;border-radius:8px;background:var(--color-error)"></span><span style="width:34px;height:34px;border-radius:8px;background:var(--color-error-bg);border:1px solid var(--color-error-border)"></span></div><div class="lbl">Error</div></div>
</div><div class="lbl" style="margin-top:10px">Solid + tint/border pairs for tags, alerts & banners</div></body></html>
