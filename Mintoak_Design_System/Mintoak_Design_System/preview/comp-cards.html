<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>body{background:var(--color-bg-layout)}
.wrap{display:flex;gap:16px}
.card{background:#fff;border:1px solid var(--color-border-secondary);border-radius:12px;box-shadow:var(--shadow-sm);padding:18px 20px;width:300px}
.k{font:500 12px/1 var(--font-sans);color:var(--color-text-tertiary)}
.v{font:700 28px/1.1 var(--font-sans);color:var(--forest-oak);margin:10px 0 4px}
.delta{font:500 12px/1 var(--font-sans);color:var(--color-success)}
.foot{display:flex;align-items:center;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--color-border-secondary)}
.av{width:30px;height:30px;border-radius:50%;background:var(--mint);color:#1c1c1c;font:600 12px/30px var(--font-sans);text-align:center}
.nm{font:600 13px/1.2 var(--font-sans)}.sub{font:400 11px/1.2 var(--font-sans);color:var(--color-text-tertiary)}</style></head><body>
<div class="wrap">
 <div class="card"><div class="k">Total volume · today</div><div class="v">₹ 4,82,300</div><div class="delta">▲ 12.4% vs yesterday</div></div>
 <div class="card"><div class="k">Recent merchant</div><div style="font:600 16px/1.2 var(--font-sans);margin-top:10px">Sunrise Traders</div><div class="sub" style="margin-top:4px">Onboarded 2 days ago</div><div class="foot"><span class="av">ST</span><div><div class="nm">Priya Shah</div><div class="sub">Relationship Manager</div></div></div></div>
</div></body></html>
